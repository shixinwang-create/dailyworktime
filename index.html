<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#DCE359" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Daily Worktime" />
    <meta name="description" content="工時追蹤與打卡管理系統" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <title>打卡系統</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: var(--loading-bg, #ffffff);
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #DCE359;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: loading-pulse 1.4s ease-in-out infinite;
      }
      .loading-logo img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }
      .loading-dots {
        display: flex;
        gap: 8px;
      }
      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #DCE359;
        animation: loading-bounce 1.2s ease-in-out infinite;
      }
      .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loading-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220,227,89,0.4); }
        50% { transform: scale(1.06); box-shadow: 0 0 0 12px rgba(220,227,89,0); }
      }
      @keyframes loading-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-10px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <script>
      (function() {
        var dark = localStorage.getItem('time_tracker_dark_mode') === 'true' ||
          (localStorage.getItem('time_tracker_dark_mode') === null &&
           window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.style.setProperty('--loading-bg', '#0a0a0a');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="app-loading">
      <div class="loading-logo">
        <img src="/favicon.png" alt="" />
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) { reg.unregister(); });
        });
      }
    </script>
  </body>
</html>
